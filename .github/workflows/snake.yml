name: Generate GitHub snake animation

on:
  schedule:
    - cron: '0 0 * * *'    # runs every day at midnight
  workflow_dispatch:       # allows manual run
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add dist/github-snake*.svg
          git diff --quiet && echo "No changes to commit" || git commit -m "Update snake animation [skip ci]"
          git push origin HEAD:${{ github.ref }} || echo "No changes to push"
